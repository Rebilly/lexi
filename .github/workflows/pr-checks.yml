name: PR checks

on: pull_request

jobs:
    eslint:
        name: Eslint
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
            - name: Install packages
              run: yarn
            - name: ESLint
              run: yarn lint && yarn format-check

    tests:
        name: Unit tests
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
            - name: Install packages
              run: yarn
            - name: All tests
              run: yarn test

    build:
        name: Commit build
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.head_ref }}
                  token: ${{ secrets.GITHUB_TOKEN }}
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
            - name: Install packages
              run: yarn
            - name: Build
              run: yarn build
            - name: Commit updated dist if it differs from build
              run: |
                if ! git diff --quiet dist/; then
                  if [ "$(git log -1 --format='%an')" = "github-actions[bot]" ]; then
                    echo "::error::dist still differs after a CI rebuild - a dependency may produce non-deterministic output"
                    git diff --text dist/
                    exit 1
                  fi
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add dist/
                  git commit -m "chore: rebuild dist"
                  git push
                fi

    build-playground:
        name: Build the playground
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
            - name: Setup node
              uses: actions/setup-node@v6
              with:
                  node-version: 22
            - name: Restore node_modules cache
              uses: actions/cache@v5
              with:
                  path: '**/node_modules'
                  key: ${{ runner.os }}-modules-${{ hashFiles('**/yarn.lock') }}
            - name: Install packages
              run: yarn
            - name: Build
              run: yarn playground:build

    # Use the branch we are running against, to write to our own PR
    # to check the comment output
    report-readability:
        name: Report readability
        needs: build
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repo
              uses: actions/checkout@v6
              with:
                  fetch-depth: 0
            - uses: ./
              with:
                  github-token: ${{ secrets.GITHUB_TOKEN }}
                  glob: '**/*.md'
